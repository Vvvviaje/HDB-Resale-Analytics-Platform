# 使用 H2 文件数据库，数据存在项目目录下的 ./data/uradb 文件里
# 完全本地、免费，不需要装 Postgres，不需要连外部数据库
spring.datasource.url=jdbc:h2:file:./data/uradb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 自动根据 Entity 类建表，第一次启动会自动创建 resale_transaction 表
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 打开 H2 自带的网页版数据库管理界面，方便你直接用浏览器看表里的数据
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8081
app.fetch.daily-batch-size=666